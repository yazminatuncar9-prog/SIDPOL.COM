<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDPOL - Sistema de Denuncias Policiales</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Tahoma, Arial, sans-serif; font-size: 11px; background: #fff; color: #000; }

/* ===== LOGIN ===== */
#login-wrap {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: #d6d3c8;
}
.login-box {
  background: #f0ede4; border: 1px solid #999;
  width: 320px; box-shadow: 2px 2px 6px rgba(0,0,0,0.3);
}
.login-hdr {
  background: #4a7bcc; color: white;
  padding: 8px 12px; display: flex; align-items: center; gap: 8px;
}
.login-logo-txt { font-size: 18px; font-weight: bold; color: #fff; }
.login-sub { font-size: 9px; color: #dde8ff; line-height: 1.3; }
.login-body { padding: 14px 16px; background: #f0ede4; }
.login-body h3 { text-align:center; font-size:11px; color:#00008b; margin-bottom:10px; border-bottom:1px solid #bbb; padding-bottom:5px; }
.lf { margin-bottom:7px; }
.lf label { display:block; font-size:10px; font-weight:bold; margin-bottom:2px; color:#333; }
.lf input, .lf select { width:100%; height:20px; border:1px solid #aca899; padding:1px 4px; font-size:11px; background:white; }
.btn-ingresar { width:100%; background:#4a7bcc; color:white; border:1px solid #2a5baa; padding:4px; font-size:11px; font-weight:bold; cursor:pointer; margin-top:4px; }
.btn-ingresar:hover { background:#2a5baa; }
.login-footer { text-align:center; font-size:9px; color:#888; margin-top:8px; }
.login-err { background:#ffe0e0; border:1px solid #ffaaaa; color:#cc0000; font-size:10px; padding:3px 6px; margin-bottom:6px; display:none; }

/* ===== APP ===== */
#app-wrap { display:none; }

.site-header { position:relative; display:block; padding:0; margin:0; }

/* STATION BAR - naranja/rojo como en imagen */
.station-bar {
  background: #f60; color: #fff;
  font-size: 10px; font-weight: bold;
  padding: 2px 6px; text-align: left;
  letter-spacing: 0.3px;
}

/* LAYOUT */
.main-layout { display:flex; min-height:calc(100vh - 70px); }

/* SIDEBAR - fondo amarillo muy claro como en imagen */
.sidebar {
  width: 110px; background: #ffffcc;
  border-right: 1px solid #ccc; flex-shrink:0;
  font-size: 11px;
}
.sidebar-item {
  display: block; padding: 3px 6px;
  color: #00008b; text-decoration: underline; cursor: pointer;
  border-bottom: 1px solid #e8e8d0;
  font-size: 11px;
}
.sidebar-item:hover { background: #e8e8c0; color: #cc0000; }
.sidebar-item.active { background: #4a7bcc; color: white; text-decoration: none; font-weight: bold; }
.sidebar-sep { height: 1px; background: #ccc; margin: 2px 0; }

/* CONTENT */
.content { flex:1; padding: 4px 6px; background: #fff; }

/* CONSULTA TITLE */
.consulta-title {
  background: #4a7bcc; color: white;
  text-align: center; font-size: 11px; font-weight: bold;
  padding: 3px 0; margin-bottom: 4px;
}

/* FORM */
.form-box {
  border: 1px solid #ccc; padding: 6px 8px;
  background: #fff; margin-bottom: 4px;
}
.radio-row { display:flex; align-items:center; gap:10px; margin-bottom:5px; font-size:11px; flex-wrap:wrap; }
.radio-row label { display:flex; align-items:center; gap:3px; cursor:pointer; }
.radio-lbl { font-size:11px; font-weight:bold; }

.fields-line { display:flex; align-items:center; flex-wrap:wrap; gap:3px; margin-bottom:3px; }
.fields-line label { font-size:11px; white-space:nowrap; }
.fields-line input[type=text] {
  height:18px; border:1px solid #aca899; padding:1px 3px;
  font-size:11px; background:white;
}
.fields-line select {
  height:18px; border:1px solid #aca899; padding:0 2px;
  font-size:11px; background:white;
}
.btn-xp {
  background:#ece9d8; border:1px solid #aca899;
  font-size:11px; padding:1px 7px; cursor:pointer; height:18px;
  color:#000;
}
.btn-xp:hover { background:#ddd; }
.btn-xp.primary { font-weight:bold; }

/* AVISO */
.aviso {
  font-size:11px; color:#cc0000;
  padding: 4px 6px; margin-bottom:4px;
  line-height: 1.4;
}

/* TABLES */
table.t {
  width:100%; border-collapse:collapse; font-size:11px;
}
table.t th {
  background: #4a7bcc; color:white;
  padding: 2px 5px; text-align:left;
  border: 1px solid #2a5baa; font-size:11px; font-weight:bold;
  white-space:nowrap;
}
table.t td {
  padding: 2px 5px; border: 1px solid #d0d0d0;
  background: white; vertical-align:middle;
}
table.t tr.persona-row td { background: #d0e0f8; }
table.t tr.den-hdr th { background: #4a7bcc; }
table.t tr.odd td  { background: #f0f4ff; }
table.t tr.even td { background: #ffffff; }
table.t tr:hover td { background: #e0ecff !important; }

.link { color: #00008b; text-decoration:underline; cursor:pointer; font-size:11px; }
.link:hover { color:#cc0000; }

.pag-row { text-align:center; padding:2px 4px; font-size:11px; background:#4a7bcc; }
.pag-row a { color:white; text-decoration:underline; cursor:pointer; margin:0 2px; font-size:11px; }
.pag-row b { color:#ffff00; margin:0 2px; font-size:11px; }

.total-txt { font-size:11px; color:#cc0000; padding:2px 0; font-weight:bold; }
.no-cert   { font-size:11px; color:#cc0000; padding:1px 0; }

.no-res { display:none; color:#cc0000; font-weight:bold; font-size:11px; padding:6px 0; }

#results-area { display:none; }

/* SPINNER */
.spin-wrap { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.25); z-index:999; align-items:center; justify-content:center; }
.spin-wrap.on { display:flex; }
.spin-box { background:#fff; border:1px solid #4a7bcc; padding:14px 22px; text-align:center; font-size:11px; color:#00008b; font-weight:bold; box-shadow:2px 2px 6px rgba(0,0,0,0.3); }
.spin-anim { font-size:18px; display:inline-block; animation:sp 0.7s linear infinite; }
@keyframes sp { to { transform:rotate(360deg); } }

/* MODAL */
.modal-wrap { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:1000; align-items:center; justify-content:center; }
.modal-wrap.on { display:flex; }
.modal-box { background:#f0ede4; border:1px solid #4a7bcc; width:520px; max-height:78vh; overflow:auto; box-shadow:3px 3px 10px rgba(0,0,0,0.35); }
.modal-hdr { background:#4a7bcc; color:white; padding:4px 10px; display:flex; justify-content:space-between; align-items:center; font-size:11px; font-weight:bold; }
.modal-close { background:#cc3300; color:white; border:none; padding:1px 6px; cursor:pointer; font-size:10px; font-weight:bold; }
.modal-body { padding:8px 12px; font-size:11px; }
.m-sect { background:#4a7bcc; color:white; padding:1px 6px; font-size:11px; font-weight:bold; margin:6px 0 3px; }
.m-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:4px; }
.m-f { flex:1; min-width:90px; }
.m-f label { display:block; font-size:9px; color:#555; font-weight:bold; }
.m-f .v { background:white; border:1px solid #bbb; padding:1px 4px; font-size:11px; }

/* FOOTER */
.site-footer { background:#f0ede4; border-top:1px solid #ccc; text-align:center; font-size:9px; color:#777; padding:3px; }

.chk-lbl { display:flex; align-items:center; gap:3px; font-size:11px; cursor:pointer; margin-left:6px; color:#333; }
</style>
</head>

  <div class="spin-box">
    <span class="spin-anim">⚙</span><br>

</div>

<div class="modal-wrap" id="modal">

    <div class="modal-hdr">
      <span>VER DENUNCIA Nro <span id="modal-nro"></span></span>
      <button class="modal-close" onclick="closeModal()">X Cerrar</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
